<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Items</title>
    <link rel="stylesheet" href="saved.css">
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">Pocket Mechanic</a></div>
            <ul>
                <li><a href="pm.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="saved.html">SavedItems</a></li>
            </ul>
        </div>
    </nav>

<section id="view-saved" class="view">
            <h1>Saved Items</h1>
            <p class="muted">Pick a vehicle to see its Maintenance / Accessories / Mods.</p>

            <label class="select-label">
                Vehicle:
                <select id="saved-vehicle-select"></select>
            </label>

            <div id="saved-columns" class="columns">
                <div class="col">
                    <h2>Maintenance</h2>
                    <ul id="list-maintenance" class="link-list"></ul>
                    <button class="secondary-btn add-link" data-section="maintenance">+ Add link</button>
                </div>
                <div class="col">
                    <h2>Accessories</h2>
                    <ul id="list-accessories" class="link-list"></ul>
                    <button class="secondary-btn add-link" data-section="accessories">+ Add link</button>
                </div>
                <div class="col">
                    <h2>Modifications</h2>
                    <ul id="list-modifications" class="link-list"></ul>
                    <button class="secondary-btn add-link" data-section="modifications">+ Add link</button>
                </div>
            </div>
        </section>
        </div>

        <div id="link-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="link-modal-title">Add link</h3>
                <label>Title
                    <input type="text" id="link-title" />
                </label>
                <label>URL
                    <input type="url" id="link-url" />
                </label>
                <button id="save-link" class="primary-btn full">Save</button>
                <button id="close-link" class="text-btn full">Cancel</button>
            </div>
        </div>

</body>
</html>
