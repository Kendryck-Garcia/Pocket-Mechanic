{% extends "base.html" %}
{% block content %}

<section class="view">
    <h1>Register</h1>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ registerForm }}

        <button type="submit" class="primary-btn">Create Account</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="{% url 'my-login' %}">Login here</a>
    </p>
</section>

{% endblock %}
